<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实时视频翻译</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>实时视频翻译</h1>
        <span id="status" class="status">已停止</span>
      </header>

      <section class="panel">
        <div class="panel-title">
          <h2>视频字幕</h2>
        </div>
        <div class="controls">
          <button id="start" type="button">开始字幕</button>
          <button id="stop" type="button" class="secondary">停止</button>
        </div>
      </section>

      <label class="field">
        <span>WebSocket 后端</span>
        <input id="backendUrl" type="url" placeholder="ws://localhost:8787/realtime" />
      </label>

      <label class="field inline">
        <input id="mockWhenBackendMissing" type="checkbox" />
        <span>后端不可用时使用模拟字幕</span>
      </label>

      <label class="field">
        <span>目标语言</span>
        <select id="targetLanguage">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="en">英语</option>
        </select>
      </label>

      <section class="panel">
        <div class="panel-title">
          <h2>网页翻译</h2>
        </div>
        <div class="controls">
          <button id="translatePage" type="button">翻译当前页</button>
          <button id="restorePage" type="button" class="secondary">恢复原文</button>
        </div>
        <label class="field inline">
          <input id="autoTranslatePages" type="checkbox" />
          <span>自动翻译新网页</span>
        </label>
      </section>

      <p id="message" class="message"></p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
